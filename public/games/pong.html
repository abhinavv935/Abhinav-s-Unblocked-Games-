<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hyper Pong</title>
  <style>
    :root {
      --primary: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.4);
      --bg: #0b0f19;
      --board: #111827;
      --text: #f3f4f6;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 500px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      background: var(--board);
      padding: 10px 16px;
      border-radius: 8px;
    }
    .hud span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .score-val {
      color: var(--primary);
      text-shadow: 0 0 8px var(--primary-glow);
      font-size: 16px;
    }
    .canvas-container {
      position: relative;
      background: var(--board);
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 12px var(--primary-glow);
      overflow: hidden;
      width: 100%;
      max-width: 500px;
      aspect-ratio: 1.6;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(4px);
      background: rgba(11, 15, 25, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 5;
    }
    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .overlay h2 {
      font-size: 24px;
      letter-spacing: 1px;
    }
    .overlay button {
      background: var(--primary);
      color: #fff;
      font-weight: bold;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 0 15px var(--primary-glow);
      transition: transform 0.1s;
    }
    .overlay button:active {
      transform: scale(0.95);
    }
    .touch-cue {
      font-size: 11px;
      color: #6b7280;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="hud">
    <span>YOU: <span id="player-score" class="score-val">0</span></span>
    <span>CPU: <span id="cpu-score" style="color: #f43f5e; text-shadow: 0 0 8px rgba(244, 63, 94, 0.4); font-size: 16px;">0</span></span>
  </div>

  <div class="canvas-container" id="container">
    <canvas id="gameCanvas" width="600" height="375"></canvas>
    
    <div id="start-overlay" class="overlay active">
      <h2>HYPER PONG</h2>
      <button id="btn-start">SERVE BALL</button>
    </div>

    <div id="gameover-overlay" class="overlay">
      <h2 id="win-status">YOU WIN!</h2>
      <p>Final Score: <span id="final-score" style="font-weight: bold;">0 - 0</span></p>
      <button id="btn-restart">PLAY AGAIN</button>
    </div>
  </div>

  <div class="touch-cue">
    Move finger/cursor vertically on the screen to slider paddle!
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const startOverlay = document.getElementById('start-overlay');
    const gameoverOverlay = document.getElementById('gameover-overlay');
    const winStatusEl = document.getElementById('win-status');
    const finalScoreEl = document.getElementById('final-score');
    
    const playerScoreEl = document.getElementById('player-score');
    const cpuScoreEl = document.getElementById('cpu-score');
    
    const btnStart = document.getElementById('btn-start');
    const btnRestart = document.getElementById('btn-restart');

    // Game variables
    const paddleWidth = 10;
    const paddleHeight = 70;
    const ballRadius = 6;
    
    let playerY = (canvas.height - paddleHeight) / 2;
    let cpuY = (canvas.height - paddleHeight) / 2;
    
    let ballX = canvas.width / 2;
    let ballY = canvas.height / 2;
    let ballSpeedX = 4;
    let ballSpeedY = 2;
    
    let playerScore = 0;
    let cpuScore = 0;
    let gameInterval = null;
    let isRunning = false;
    const maxScore = 5;

    // Web Audio Synthesizer
    let audioCtx = null;
    function playTone(freq, duration, type = 'sine') {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    function resetBall() {
      ballX = canvas.width / 2;
      ballY = canvas.height / 2;
      ballSpeedX = (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 2);
      ballSpeedY = (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 2);
    }

    function startMatch() {
      playerScore = 0;
      cpuScore = 0;
      playerScoreEl.innerText = '0';
      cpuScoreEl.innerText = '0';
      startOverlay.classList.remove('active');
      gameoverOverlay.classList.remove('active');
      resetBall();
      isRunning = true;
      playTone(400, 0.15, 'triangle');
      
      clearInterval(gameInterval);
      gameInterval = setInterval(gameLoop, 1000 / 60); // 60 FPS
    }

    function gameLoop() {
      if (!isRunning) return;
      
      updatePhysics();
      controlCpuPaddle();
      draw();
    }

    function updatePhysics() {
      // Move Ball
      ballX += ballSpeedX;
      ballY += ballSpeedY;

      // Bounce Top & Bottom Walls
      if (ballY - ballRadius <= 0) {
        ballY = ballRadius;
        ballSpeedY = -ballSpeedY;
        playTone(320, 0.05, 'sine');
      } else if (ballY + ballRadius >= canvas.height) {
        ballY = canvas.height - ballRadius;
        ballSpeedY = -ballSpeedY;
        playTone(320, 0.05, 'sine');
      }

      // Check Player Paddle Collision (LEFT)
      if (ballSpeedX < 0 && ballX - ballRadius <= paddleWidth + 15 && ballX - ballRadius >= paddleWidth) {
        if (ballY >= playerY && ballY <= playerY + paddleHeight) {
          ballSpeedX = -ballSpeedX;
          // Calculate spin angle based on collision factor
          let diffY = ballY - (playerY + paddleHeight / 2);
          ballSpeedY = diffY * 0.25;
          // Speed up slightly each hit to sustain thrill
          ballSpeedX *= 1.05;
          playTone(550, 0.1, 'sine');
        }
      }

      // Check CPU Paddle Collision (RIGHT)
      if (ballSpeedX > 0 && ballX + ballRadius >= canvas.width - paddleWidth - 15 && ballX + ballRadius <= canvas.width - paddleWidth) {
        if (ballY >= cpuY && ballY <= cpuY + paddleHeight) {
          ballSpeedX = -ballSpeedX;
          let diffY = ballY - (cpuY + paddleHeight / 2);
          ballSpeedY = diffY * 0.25;
          ballSpeedX *= 1.05;
          playTone(480, 0.1, 'sine');
        }
      }

      // Out of Bounds Left / Side Score Player
      if (ballX < 0) {
        cpuScore++;
        cpuScoreEl.innerText = cpuScore;
        playTone(180, 0.35, 'sawtooth');
        checkScores();
      }
      
      // Out of Bounds Right / Side Score CPU
      else if (ballX > canvas.width) {
        playerScore++;
        playerScoreEl.innerText = playerScore;
        playTone(650, 0.25, 'triangle');
        checkScores();
      }
    }

    function controlCpuPaddle() {
      // Simple AI follows ball slowly
      let targetY = ballY - paddleHeight / 2;
      let diff = targetY - cpuY;
      let easeSpeed = 3.6; // CPU speed parameter
      
      if (Math.abs(diff) > 2) {
        cpuY += Math.sign(diff) * easeSpeed;
      }
      
      // Keep inside board
      if (cpuY < 0) cpuY = 0;
      if (cpuY + paddleHeight > canvas.height) cpuY = canvas.height - paddleHeight;
    }

    function checkScores() {
      if (playerScore >= maxScore || cpuScore >= maxScore) {
        isRunning = false;
        clearInterval(gameInterval);
        
        let won = playerScore >= maxScore;
        winStatusEl.innerText = won ? "YOU WIN!" : "CPU WINS!";
        winStatusEl.style.color = won ? "#10b981" : "#f43f5e";
        finalScoreEl.innerText = `${playerScore} - ${cpuScore}`;
        
        playTone(won ? 800 : 120, 0.5, won ? 'sine' : 'sawtooth');
        gameoverOverlay.classList.add('active');
      } else {
        resetBall();
      }
    }

    function draw() {
      // Clear panel
      ctx.fillStyle = '#111827';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw Center dashed line
      ctx.setLineDash([8, 8]);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, 0);
      ctx.lineTo(canvas.width / 2, canvas.height);
      ctx.stroke();
      ctx.setLineDash([]); // clear dash

      // Player Paddle (LEFT - Neon Blue)
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#3b82f6';
      ctx.fillStyle = '#3b82f6';
      ctx.fillRect(15, playerY, paddleWidth, paddleHeight);

      // CPU Paddle (RIGHT - Rose Red)
      ctx.shadowColor = '#f43f5e';
      ctx.fillStyle = '#f43f5e';
      ctx.fillRect(canvas.width - paddleWidth - 15, cpuY, paddleWidth, paddleHeight);

      // Ball (Neon White-Blue glow)
      ctx.shadowColor = '#fff';
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
      ctx.fill();

      // Reset shadow blur
      ctx.shadowBlur = 0;
    }

    // Controls tracking (Both mouse and tactile drag)
    function setPaddlePosition(clientY) {
      const rect = canvas.getBoundingClientRect();
      const relativeY = clientY - rect.top;
      
      // Map scale if drawing size is stretched/shrunk in UI responsive view
      const scaleY = canvas.height / rect.height;
      
      playerY = (relativeY * scaleY) - paddleHeight / 2;
      
      // Clamp boundaries
      if (playerY < 0) playerY = 0;
      if (playerY + paddleHeight > canvas.height) playerY = canvas.height - paddleHeight;
    }

    window.addEventListener('mousemove', (e) => {
      setPaddlePosition(e.clientY);
    });

    window.addEventListener('touchmove', (e) => {
      if (e.touches && e.touches[0]) {
        setPaddlePosition(e.touches[0].clientY);
      }
    }, { passive: true });

    btnStart.addEventListener('click', startMatch);
    btnRestart.addEventListener('click', startMatch);

  </script>
</body>
</html>
