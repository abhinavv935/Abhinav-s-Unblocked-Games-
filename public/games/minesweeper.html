<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quantum Mines</title>
  <style>
    :root {
      --primary: #06b6d4;
      --primary-glow: rgba(6, 182, 212, 0.4);
      --bg: #0b0f19;
      --board: #111827;
      --text: #f3f4f6;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 380px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      background: var(--board);
      padding: 10px 16px;
      border-radius: 8px;
    }
    .hud-val {
      color: var(--primary);
      text-shadow: 0 0 8px var(--primary-glow);
    }
    .grid-container {
      position: relative;
      background: var(--board);
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 12px var(--primary-glow);
      overflow: hidden;
      width: 100%;
      max-width: 380px;
      aspect-ratio: 1;
      padding: 12px;
    }
    .minefield {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      grid-template-rows: repeat(10, 1fr);
      gap: 4px;
      width: 100%;
      height: 100%;
    }
    .cell {
      background: #1f2937;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      color: #9ca3af;
      transition: background 0.15s, border-color 0.15s;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .cell:hover {
      background: #374151;
    }
    .cell.revealed {
      background: #0f172a;
      border-color: transparent;
      color: #f3f4f6;
      cursor: default;
    }
    .cell.revealed.mine {
      background: #ef4444;
      color: white;
    }
    .cell.flagged {
      color: #ec4899;
      text-shadow: 0 0 8px rgba(236, 72, 153, 0.4);
    }
    /* Number styling */
    .cell[data-num="1"] { color: #3b82f6; }
    .cell[data-num="2"] { color: #10b981; }
    .cell[data-num="3"] { color: #ef4444; }
    .cell[data-num="4"] { color: #8b5cf6; }
    .cell[data-num="5"] { color: #f59e0b; }
    .cell[data-num="6"] { color: #06b6d4; }
    .cell[data-num="7"] { color: #ec4899; }
    .cell[data-num="8"] { color: #f43f5e; }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(4px);
      background: rgba(11, 15, 25, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 5;
    }
    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .overlay h2 {
      font-size: 24px;
      letter-spacing: 1px;
    }
    .overlay button {
      background: var(--primary);
      color: #000;
      font-weight: bold;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 0 15px var(--primary-glow);
      transition: transform 0.1s;
    }
    .overlay button:active {
      transform: scale(0.95);
    }
    .controls-tip {
      font-size: 11px;
      color: #6b7280;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="hud">
    <span>MINES REMAINING: <span id="mines-count" class="hud-val">10</span></span>
    <span>TIMER: <span id="timer" class="hud-val">0s</span></span>
  </div>

  <div class="grid-container">
    <div id="minefield" class="minefield"></div>

    <div id="start-overlay" class="overlay active">
      <h2>QUANTUM MINES</h2>
      <button id="btn-start">SWEEP GRIDS</button>
    </div>

    <div id="gameover-overlay" class="overlay">
      <h2 id="end-title" style="color: #ef4444;">DETONATED</h2>
      <p id="end-subtitle">Time taken: <span id="final-time">0s</span></p>
      <button id="btn-restart">TRY AGAIN</button>
    </div>
  </div>

  <div class="controls-tip">
    PC: Left-click to open, Right-click to flag.<br>
    Mobile: Click to open, Long-Press (or tap flag button below) to flag.
    <div style="margin-top: 5px;">
      <button id="btn-mobile-flag" style="background: #1f2937; color: #fff; padding: 4px 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); cursor:pointer; font-size: 12px;">Toggle flag tool: OFF</button>
    </div>
  </div>

  <script>
    const minefieldEl = document.getElementById('minefield');
    const startOverlay = document.getElementById('start-overlay');
    const gameoverOverlay = document.getElementById('gameover-overlay');
    
    const endTitleEl = document.getElementById('end-title');
    const finalTimeEl = document.getElementById('final-time');
    
    const minesCountEl = document.getElementById('mines-count');
    const timerEl = document.getElementById('timer');

    const btnStart = document.getElementById('btn-start');
    const btnRestart = document.getElementById('btn-restart');
    const btnMobileFlag = document.getElementById('btn-mobile-flag');

    const size = 10;
    const bombCount = 12;
    let minefield = [];
    let isRunning = false;
    let seconds = 0;
    let timerInterval = null;
    let mobileFlagMode = false;

    // Web Audio Synthesizer
    let audioCtx = null;
    function playTone(freq, duration, type = 'sine') {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    function generateField() {
      minefield = [];
      minefieldEl.innerHTML = '';
      minesCountEl.innerText = bombCount;
      seconds = 0;
      timerEl.innerText = '0s';

      // 1. Build blank representation
      for (let r = 0; r < size; r++) {
        minefield[r] = [];
        for (let c = 0; c < size; c++) {
          minefield[r][c] = {
            r, c,
            isBomb: false,
            revealed: false,
            flagged: false,
            neighborBombs: 0,
            el: null
          };
        }
      }

      // 2. Lay bombs
      let bombsLaid = 0;
      while (bombsLaid < bombCount) {
        let r = Math.floor(Math.random() * size);
        let c = Math.floor(Math.random() * size);
        if (!minefield[r][c].isBomb) {
          minefield[r][c].isBomb = true;
          bombsLaid++;
        }
      }

      // 3. Count neighbors
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (!minefield[r][c].isBomb) {
            let neighbors = 0;
            for (let dr = -1; dr <= 1; dr++) {
              for (let dc = -1; dc <= 1; dc++) {
                let nr = r + dr;
                let nc = c + dc;
                if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
                  if (minefield[nr][nc].isBomb) neighbors++;
                }
              }
            }
            minefield[r][c].neighborBombs = neighbors;
          }
        }
      }

      // 4. Instantiate elements
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const cellData = minefield[r][c];
          const cellEl = document.createElement('div');
          cellEl.classList.add('cell');
          cellEl.dataset.r = r;
          cellEl.dataset.c = c;
          
          cellEl.addEventListener('click', () => handleCellClick(r, c));
          cellEl.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            toggleFlag(r, c);
          });
          
          cellData.el = cellEl;
          minefieldEl.appendChild(cellEl);
        }
      }
    }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (isRunning) {
          seconds++;
          timerEl.innerText = `${seconds}s`;
        }
      }, 1000);
    }

    function handleCellClick(r, c) {
      if (!isRunning) return;
      
      const cell = minefield[r][c];
      if (cell.revealed) return;

      if (mobileFlagMode) {
        toggleFlag(r, c);
        return;
      }

      if (cell.flagged) return;

      if (cell.isBomb) {
        detonate(r, c);
      } else {
        revealCell(r, c);
        playTone(300 + (cell.neighborBombs * 50), 0.05, 'sine');
        checkWin();
      }
    }

    function toggleFlag(r, c) {
      if (!isRunning) return;
      const cell = minefield[r][c];
      if (cell.revealed) return;

      cell.flagged = !cell.flagged;
      if (cell.flagged) {
        cell.el.classList.add('flagged');
        cell.el.innerText = '🚩';
        playTone(450, 0.04, 'triangle');
      } else {
        cell.el.classList.remove('flagged');
        cell.el.innerText = '';
        playTone(350, 0.04, 'triangle');
      }

      // adjust hud counter
      let flagsCount = 0;
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (minefield[r][c].flagged) flagsCount++;
        }
      }
      minesCountEl.innerText = Math.max(0, bombCount - flagsCount);
    }

    function revealCell(r, c) {
      const cell = minefield[r][c];
      if (cell.revealed || cell.flagged) return;

      cell.revealed = true;
      cell.el.classList.add('revealed');

      if (cell.neighborBombs > 0) {
        cell.el.innerText = cell.neighborBombs;
        cell.el.dataset.num = cell.neighborBombs;
      } else {
        cell.el.innerText = '';
        // Flood fill empty neighbors
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            let nr = r + dr;
            let nc = c + dc;
            if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
              revealCell(nr, nc);
            }
          }
        }
      }
    }

    function detonate(detonatedR, detonatedC) {
      // reveal all bombs
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const cells = minefield[r][c];
          if (cells.isBomb) {
            cells.el.classList.add('revealed', 'mine');
            cells.el.innerText = '💥';
          }
        }
      }
      
      isRunning = false;
      clearInterval(timerInterval);
      playTone(100, 0.5, 'sawtooth');

      endTitleEl.innerText = "MINE DETONATED";
      endTitleEl.style.color = "#ef4444";
      finalTimeEl.innerText = `${seconds}s`;
      gameoverOverlay.classList.add('active');
    }

    function checkWin() {
      let unrevealedCount = 0;
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (!minefield[r][c].revealed && !minefield[r][c].isBomb) {
            unrevealedCount++;
          }
        }
      }

      if (unrevealedCount === 0) {
        win();
      }
    }

    function win() {
      isRunning = false;
      clearInterval(timerInterval);
      playTone(750, 0.3, 'sine');
      setTimeout(() => playTone(1000, 0.4, 'sine'), 100);

      endTitleEl.innerText = "GRID SANITIZED!";
      endTitleEl.style.color = "#06b6d4";
      finalTimeEl.innerText = `${seconds}s (Defused)`;
      gameoverOverlay.classList.add('active');
    }

    function initGame() {
      generateField();
      startOverlay.classList.remove('active');
      gameoverOverlay.classList.remove('active');
      isRunning = true;
      startTimer();
      playTone(600, 0.1, 'sine');
    }

    btnStart.addEventListener('click', initGame);
    btnRestart.addEventListener('click', initGame);

    btnMobileFlag.addEventListener('click', () => {
      mobileFlagMode = !mobileFlagMode;
      btnMobileFlag.innerText = `Toggle flag tool: ${mobileFlagMode ? 'ON 🚩' : 'OFF'}`;
      btnMobileFlag.style.background = mobileFlagMode ? '#ec4899' : '#1f2937';
      btnMobileFlag.style.borderColor = mobileFlagMode ? '#ec4899' : 'rgba(255,255,255,0.1)';
      playTone(mobileFlagMode ? 550 : 350, 0.08, 'triangle');
    });

  </script>
</body>
</html>
