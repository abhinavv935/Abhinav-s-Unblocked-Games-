<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosmic Defender</title>
  <style>
    :root {
      --primary: #ef4444;
      --primary-glow: rgba(239, 68, 68, 0.4);
      --bg: #0b0f19;
      --board: #111827;
      --text: #f3f4f6;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 440px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      background: var(--board);
      padding: 10px 16px;
      border-radius: 8px;
    }
    .score-val {
      color: #ef4444;
      text-shadow: 0 0 8px var(--primary-glow);
    }
    .canvas-container {
      position: relative;
      background: var(--board);
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 15px rgba(239, 68, 68, 0.25);
      overflow: hidden;
      width: 100%;
      max-width: 440px;
      aspect-ratio: 0.9;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(4px);
      background: rgba(11, 15, 25, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 5;
    }
    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .overlay h2 {
      font-size: 24px;
      letter-spacing: 1px;
    }
    .overlay button {
      background: var(--primary);
      color: #fff;
      font-weight: bold;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 0 15px var(--primary-glow);
      transition: transform 0.1s;
    }
    .overlay button:active {
      transform: scale(0.95);
    }
    .controls-overlay {
      display: flex;
      justify-content: space-around;
      width: 100%;
      max-width: 440px;
      margin-top: 10px;
      gap: 10px;
    }
    @media (min-width: 500px) {
      .controls-overlay {
        display: none;
      }
    }
    .joy-btn {
      flex: 1;
      background: var(--board);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
      cursor: pointer;
    }
    .joy-btn:active {
      background: #ef4444;
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="hud">
    <span>SCORE: <span id="score" class="score-val">0</span></span>
    <span>LIVES: <span id="lives" style="color: #ef4444">♥ ♥ ♥</span></span>
    <span>HIGH SCORE: <span id="high-score">0</span></span>
  </div>

  <div class="canvas-container" id="game-stage">
    <canvas id="gameCanvas" width="440" height="480"></canvas>
    
    <div id="start-overlay" class="overlay active">
      <h2>COSMIC DEFENDER</h2>
      <button id="btn-start">ACTIVATE WEAPONS</button>
    </div>

    <div id="gameover-overlay" class="overlay">
      <h2 id="end-title" style="color: #ef4444;">SHIP DESTROYED</h2>
      <p>Final Defense Score: <span id="final-score" style="color: #ef4444; font-weight: bold;">0</span></p>
      <button id="btn-restart">RELAUNCH DECK</button>
    </div>
  </div>

  <div class="controls-overlay">
    <div class="joy-btn" id="joy-left">MOVE LEFT</div>
    <div class="joy-btn" id="joy-shoot">FIRE LASER</div>
    <div class="joy-btn" id="joy-right">MOVE RIGHT</div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const startOverlay = document.getElementById('start-overlay');
    const gameoverOverlay = document.getElementById('gameover-overlay');
    const finalScoreEl = document.getElementById('final-score');
    const endTitleEl = document.getElementById('end-title');
    
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const highScoreEl = document.getElementById('high-score');

    const btnStart = document.getElementById('btn-start');
    const btnRestart = document.getElementById('btn-restart');

    let score = 0;
    let lives = 3;
    let highScore = localStorage.getItem('unblocked_games_invaders_highscore') || 0;
    highScoreEl.innerText = highScore;

    let isRunning = false;
    let frameCount = 0;

    // Player State
    const playerWidth = 32;
    const playerHeight = 16;
    let playerX = (canvas.width - playerWidth) / 2;
    const playerY = canvas.height - 40;
    let playerSpeed = 5;

    // Controllers
    let keys = {};
    let lasers = [];
    let aliens = [];
    let alienLasers = [];

    // Synthesizer
    let audioCtx = null;
    function playTone(freq, duration, type = 'sine') {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.06, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    function initGame() {
      score = 0;
      lives = 3;
      scoreEl.innerText = score;
      livesEl.innerText = '♥'.repeat(lives);
      
      lasers = [];
      alienLasers = [];
      playerX = (canvas.width - playerWidth) / 2;
      frameCount = 0;

      spawnAlienGrid();

      startOverlay.classList.remove('active');
      gameoverOverlay.classList.remove('active');
      playTone(392, 0.1, 'triangle');
      setTimeout(() => playTone(523, 0.15, 'triangle'), 80);

      isRunning = true;
      requestAnimationFrame(gameLoop);
    }

    function spawnAlienGrid() {
      aliens = [];
      const rows = 4;
      const cols = 7;
      const alienW = 24;
      const alienH = 16;
      const spacingX = 18;
      const spacingY = 16;
      const offsetLeft = 40;
      const offsetTop = 40;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          aliens.push({
            x: offsetLeft + c * (alienW + spacingX),
            y: offsetTop + r * (alienH + spacingY),
            width: alienW,
            height: alienH,
            points: (4 - r) * 10
          });
        }
      }
    }

    function fireLaser() {
      if (!isRunning) return;
      lasers.push({
        x: playerX + playerWidth / 2 - 2,
        y: playerY - 8,
        width: 4,
        height: 10,
        speed: 7
      });
      playTone(580, 0.08, 'sawtooth');
    }

    function gameOver(victory = false) {
      isRunning = false;
      finalScoreEl.innerText = score;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('unblocked_games_invaders_highscore', highScore);
        highScoreEl.innerText = highScore;
      }

      endTitleEl.innerText = victory ? "GALAXY DEFENDED!" : "SHIP VAPORIZED";
      endTitleEl.style.color = victory ? "#10b981" : "#ef4444";
      gameoverOverlay.classList.add('active');
      playTone(victory ? 800 : 150, 0.5, victory ? 'sine' : 'sawtooth');
    }

    function gameLoop() {
      if (!isRunning) return;

      updatePhysics();
      draw();

      frameCount++;
      requestAnimationFrame(gameLoop);
    }

    function updatePhysics() {
      // Player movement
      if (keys['ArrowLeft'] || keys['KeyA']) {
        playerX -= playerSpeed;
      }
      if (keys['ArrowRight'] || keys['KeyD']) {
        playerX += playerSpeed;
      }
      // Clamp boundaries
      if (playerX < 15) playerX = 15;
      if (playerX > canvas.width - playerWidth - 15) playerX = canvas.width - playerWidth - 15;

      // Update player lasers
      for (let i = lasers.length - 1; i >= 0; i--) {
        const l = lasers[i];
        l.y -= l.speed;
        
        // Check Alien Hit
        for (let j = aliens.length - 1; j >= 0; j--) {
          const a = aliens[j];
          if (
            l.x > a.x && l.x < a.x + a.width &&
            l.y > a.y && l.y < a.y + a.height
          ) {
            aliens.splice(j, 1);
            lasers.splice(i, 1);
            score += a.points;
            scoreEl.innerText = score;
            playTone(280 + a.points * 4, 0.06, 'sine');
            
            if (aliens.length === 0) {
              gameOver(true);
            }
            break; // split single hit
          }
        }

        // Off-screen clean
        if (l && l.y < 0) {
          lasers.splice(i, 1);
        }
      }

      // Move Aliens laterally & down
      let horizontalMove = Math.sin(frameCount * 0.015) * 1.5;
      let advanceY = 0;
      if (frameCount % 600 === 0) {
        advanceY = 12; // periodically step down
      }

      aliens.forEach(a => {
        a.x += horizontalMove;
        a.y += advanceY;

        // Hit player plane floor
        if (a.y + a.height >= playerY) {
          gameOver(false);
        }
      });

      // Aliens occasionally shoot
      if (frameCount % 75 === 0 && aliens.length > 0) {
        let shooterIndices = [];
        for (let k = 0; k < Math.min(aliens.length, 3); k++) {
          shooterIndices.push(Math.floor(Math.random() * aliens.length));
        }
        shooterIndices.forEach(idx => {
          const sh = aliens[idx];
          if (sh) {
            alienLasers.push({
              x: sh.x + sh.width / 2,
              y: sh.y + sh.height,
              width: 3,
              height: 8,
              speed: 4
            });
          }
        });
      }

      // Update alien projectiles
      for (let i = alienLasers.length - 1; i >= 0; i--) {
        const al = alienLasers[i];
        al.y += al.speed;

        // Hit check player
        if (
          al.x > playerX && al.x < playerX + playerWidth &&
          al.y > playerY && al.y < playerY + playerHeight
        ) {
          alienLasers.splice(i, 1);
          lives--;
          livesEl.innerText = '♥'.repeat(lives);
          playTone(180, 0.25, 'sawtooth');
          
          if (lives <= 0) {
            gameOver(false);
          }
          continue;
        }

        if (al.y > canvas.height) {
          alienLasers.splice(i, 1);
        }
      }
    }

    function draw() {
      // Background star grid clearing
      ctx.fillStyle = '#111827';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Starfield background
      ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
      for (let i = 0; i < 15; i++) {
        let sx = (i * 72 + frameCount * 0.5) % canvas.width;
        let sy = (i * 54 + frameCount * 0.2) % canvas.height;
        ctx.fillRect(sx, sy, 1.5, 1.5);
      }

      // Draw Player Ship (Neon Red/Orange wedge)
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#ef4444';
      ctx.fillStyle = '#ef4444';

      ctx.beginPath();
      ctx.moveTo(playerX + playerWidth / 2, playerY);
      ctx.lineTo(playerX + playerWidth, playerY + playerHeight);
      ctx.lineTo(playerX, playerY + playerHeight);
      ctx.closePath();
      ctx.fill();

      // Gun turret details
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(playerX + playerWidth / 2 - 2, playerY - 3, 4, 3);

      // Draw Player lasers (Green speed lines)
      ctx.fillStyle = '#10b981';
      ctx.shadowColor = '#10b981';
      lasers.forEach(l => {
        ctx.fillRect(l.x, l.y, l.width, l.height);
      });

      // Draw Aliens (Invasion block glow)
      ctx.shadowColor = '#f59e0b';
      aliens.forEach(a => {
        ctx.fillStyle = '#f59e0b';
        ctx.fillRect(a.x, a.y, a.width, a.height);
        
        ctx.fillStyle = '#111827'; // eye detail
        ctx.fillRect(a.x + 4, a.y + 4, 3, 3);
        ctx.fillRect(a.x + a.width - 7, a.y + 4, 3, 3);
      });

      // Draw alien projectiles
      ctx.fillStyle = '#ef4444';
      ctx.shadowColor = '#ef4444';
      alienLasers.forEach(al => {
        ctx.fillRect(al.x, al.y, al.width, al.height);
      });

      ctx.shadowBlur = 0; // reset
    }

    // Keyboard Input mappings
    window.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space') {
        e.preventDefault();
        fireLaser();
      }
    });

    window.addEventListener('keyup', e => {
      keys[e.code] = false;
    });

    // Touch bindings
    document.getElementById('joy-left').addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowLeft'] = true; }, { passive: false });
    document.getElementById('joy-left').addEventListener('touchend', e => { e.preventDefault(); keys['ArrowLeft'] = false; }, { passive: false });
    document.getElementById('joy-right').addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowRight'] = true; }, { passive: false });
    document.getElementById('joy-right').addEventListener('touchend', e => { e.preventDefault(); keys['ArrowRight'] = false; }, { passive: false });
    document.getElementById('joy-shoot').addEventListener('touchstart', e => { e.preventDefault(); fireLaser(); }, { passive: false });

    // Mouse bindings for controls virtual buttons
    document.getElementById('joy-left').addEventListener('mousedown', () => keys['ArrowLeft'] = true);
    document.getElementById('joy-left').addEventListener('mouseup', () => keys['ArrowLeft'] = false);
    document.getElementById('joy-right').addEventListener('mousedown', () => keys['ArrowRight'] = true);
    document.getElementById('joy-right').addEventListener('mouseup', () => keys['ArrowRight'] = false);
    document.getElementById('joy-shoot').addEventListener('mousedown', fireLaser);

    // Mouse Tracking on the Canvas Stage direct
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const relativeX = e.clientX - rect.left;
      const scaleX = canvas.width / rect.width;
      playerX = (relativeX * scaleX) - playerWidth / 2;
    });

    canvas.addEventListener('mousedown', fireLaser);

    btnStart.addEventListener('click', initGame);
    btnRestart.addEventListener('click', initGame);

  </script>
</body>
</html>
