<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Floppy Bird</title>
  <style>
    :root {
      --primary: #f59e0b;
      --primary-glow: rgba(245, 158, 11, 0.4);
      --bg: #0b0f19;
      --board: #111827;
      --text: #f3f4f6;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 360px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      background: var(--board);
      padding: 10px 16px;
      border-radius: 8px;
    }
    .score-val {
      color: var(--primary);
      text-shadow: 0 0 8px var(--primary-glow);
    }
    .canvas-container {
      position: relative;
      background: var(--board);
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 15px var(--primary-glow);
      overflow: hidden;
      width: 100%;
      max-width: 360px;
      aspect-ratio: 0.75;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(4px);
      background: rgba(11, 15, 25, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 5;
    }
    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .overlay h2 {
      font-size: 24px;
      letter-spacing: 1px;
    }
    .overlay button {
      background: var(--primary);
      color: #000;
      font-weight: bold;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 0 15px var(--primary-glow);
      transition: transform 0.1s;
    }
    .overlay button:active {
      transform: scale(0.95);
    }
    .hint {
      font-size: 11px;
      color: #9ca3af;
      text-transform: uppercase;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="hud">
    <span>SCORE: <span id="score" class="score-val">0</span></span>
    <span>HIGH SCORE: <span id="high-score">0</span></span>
  </div>

  <div class="canvas-container" id="tap-target">
    <canvas id="gameCanvas" width="360" height="480"></canvas>
    
    <div id="start-overlay" class="overlay active">
      <h2>FLOPPY BIRD</h2>
      <button id="btn-start">FLAP WINGS</button>
      <span class="hint">Tap anywhere/Space to fly!</span>
    </div>

    <div id="gameover-overlay" class="overlay">
      <h2 style="color: #ef4444;">CRASH LANDING</h2>
      <p>Final Score: <span id="final-score" style="color: var(--primary); font-weight: bold;">0</span></p>
      <button id="btn-restart">TRY AGAIN</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const startOverlay = document.getElementById('start-overlay');
    const gameoverOverlay = document.getElementById('gameover-overlay');
    const finalScoreEl = document.getElementById('final-score');
    
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('high-score');

    const btnStart = document.getElementById('btn-start');
    const btnRestart = document.getElementById('btn-restart');
    const tapTarget = document.getElementById('tap-target');

    // Game parameters
    let score = 0;
    let highScore = localStorage.getItem('unblocked_games_flappy_highscore') || 0;
    highScoreEl.innerText = highScore;

    let birdY = canvas.height / 2;
    let velocity = 0;
    const gravity = 0.28;
    const jumpPower = -5.8;
    const birdRadius = 12;

    let pipes = [];
    const pipeWidth = 52;
    const pipeGap = 120;
    const pipeInterval = 90; // frames
    let frameCount = 0;
    let isRunning = false;

    // Audio synthesizer
    let audioCtx = null;
    function playTone(freq, duration, type = 'sine') {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    function initGame() {
      score = 0;
      birdY = canvas.height / 2;
      velocity = 0;
      pipes = [];
      frameCount = 0;
      scoreEl.innerText = score;
      
      startOverlay.classList.remove('active');
      gameoverOverlay.classList.remove('active');
      playTone(520, 0.15, 'triangle');

      isRunning = true;
      requestAnimationFrame(draw);
    }

    function flap() {
      if (!isRunning) return;
      velocity = jumpPower;
      playTone(380, 0.08, 'sine');
    }

    function spawnPipe() {
      const minHeight = 40;
      const maxHeight = canvas.height - pipeGap - minHeight;
      const topHeight = Math.floor(Math.random() * (maxHeight - minHeight)) + minHeight;
      
      pipes.push({
        x: canvas.width,
        top: topHeight,
        bottom: canvas.height - (topHeight + pipeGap),
        passed: false
      });
    }

    function gameOver() {
      isRunning = false;
      playTone(180, 0.4, 'sawtooth');
      finalScoreEl.innerText = score;
      
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('unblocked_games_flappy_highscore', highScore);
        highScoreEl.innerText = highScore;
      }
      gameoverOverlay.classList.add('active');
    }

    function draw() {
      if (!isRunning) return;

      // Clear Canvas
      ctx.fillStyle = '#111827';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw starry ambient bits
      ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
      for (let i = 0; i < 5; i++) {
        let starsX = (frameCount + i * 120) % canvas.width;
        ctx.fillRect(starsX, (i * 90) % canvas.height, 2, 2);
      }

      // Physics update
      velocity += gravity;
      birdY += velocity;

      // Floor & ceiling checks
      if (birdY - birdRadius < 0) {
        birdY = birdRadius;
        velocity = 0;
      }
      if (birdY + birdRadius >= canvas.height) {
        gameOver();
        return;
      }

      // Span/Move pipes
      if (frameCount % pipeInterval === 0) {
        spawnPipe();
      }

      for (let i = pipes.length - 1; i >= 0; i--) {
        const p = pipes[i];
        p.x -= 2; // move left

        // Draw top pipe
        ctx.fillStyle = '#10b981';
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#059669';
        ctx.fillRect(p.x, 0, pipeWidth, p.top);
        
        // Draw bottom pipe
        ctx.fillRect(p.x, canvas.height - p.bottom, pipeWidth, p.bottom);
        ctx.shadowBlur = 0; // reset

        // Collision logic
        const birdX = 80;
        if (
          birdX + birdRadius > p.x &&
          birdX - birdRadius < p.x + pipeWidth &&
          (birdY - birdRadius < p.top || birdY + birdRadius > canvas.height - p.bottom)
        ) {
          gameOver();
          return;
        }

        // Pass/Score logic
        if (!p.passed && p.x + pipeWidth < birdX) {
          p.passed = true;
          score++;
          scoreEl.innerText = score;
          playTone(660, 0.1, 'sine');
        }

        // Clean off-screen pipes
        if (p.x + pipeWidth < 0) {
          pipes.splice(i, 1);
        }
      }

      // Draw Bird
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#f59e0b';
      ctx.fillStyle = '#f59e0b';
      ctx.beginPath();
      ctx.arc(80, birdY, birdRadius, 0, Math.PI * 2);
      ctx.fill();

      // Wing (micro animation)
      ctx.fillStyle = '#d97706';
      let wingOffset = Math.sin(frameCount * 0.4) * 4;
      ctx.beginPath();
      ctx.ellipse(75, birdY + 2, 6, 4 + wingOffset, Math.PI/4, 0, Math.PI*2);
      ctx.fill();

      // Eye
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(84, birdY - 3, 3, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#000000';
      ctx.beginPath();
      ctx.arc(84, birdY - 3, 1.2, 0, Math.PI*2);
      ctx.fill();

      ctx.shadowBlur = 0; // reset

      frameCount++;
      requestAnimationFrame(draw);
    }

    // Input bindings
    window.addEventListener('keydown', (e) => {
      if (['Space', 'ArrowUp', 'KeyW'].includes(e.code)) {
        e.preventDefault();
        flap();
      }
    });

    tapTarget.addEventListener('touchstart', (e) => {
      e.preventDefault();
      flap();
    }, { passive: false });

    tapTarget.addEventListener('mousedown', flap);

    btnStart.addEventListener('click', (e) => {
      e.stopPropagation();
      initGame();
    });

    btnRestart.addEventListener('click', (e) => {
      e.stopPropagation();
      initGame();
    });

  </script>
</body>
</html>
