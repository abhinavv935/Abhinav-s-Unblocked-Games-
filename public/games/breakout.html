<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Brick Buster</title>
  <style>
    :root {
      --primary: #a855f7;
      --primary-glow: rgba(168, 85, 247, 0.4);
      --bg: #0b0f19;
      --board: #111827;
      --text: #f3f4f6;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 480px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      background: var(--board);
      padding: 10px 16px;
      border-radius: 8px;
    }
    .score-val {
      color: var(--primary);
      text-shadow: 0 0 8px var(--primary-glow);
    }
    .canvas-container {
      position: relative;
      background: var(--board);
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 15px var(--primary-glow);
      overflow: hidden;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1.2;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(4px);
      background: rgba(11, 15, 25, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 5;
    }
    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .overlay h2 {
      font-size: 24px;
      letter-spacing: 1px;
    }
    .overlay button {
      background: var(--primary);
      color: #fff;
      font-weight: bold;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 0 15px var(--primary-glow);
      transition: transform 0.1s;
    }
    .overlay button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <div class="hud">
    <span>SCORE: <span id="score" class="score-val">0</span></span>
    <span>LIVES: <span id="lives" style="color: #f43f5e">3</span></span>
    <span>HIGH: <span id="high-score">0</span></span>
  </div>

  <div class="canvas-container">
    <canvas id="gameCanvas" width="480" height="400"></canvas>
    
    <div id="start-overlay" class="overlay active">
      <h2>BRICK BUSTER</h2>
      <button id="btn-start">START LAUNCH</button>
    </div>

    <div id="gameover-overlay" class="overlay">
      <h2 id="end-title" style="color: #ef4444;">GAME OVER</h2>
      <p>Your Final Score: <span id="final-score" style="color: var(--primary); font-weight: bold;">0</span></p>
      <button id="btn-restart">REPLAY</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const startOverlay = document.getElementById('start-overlay');
    const gameoverOverlay = document.getElementById('gameover-overlay');
    const endTitleEl = document.getElementById('end-title');
    const finalScoreEl = document.getElementById('final-score');
    
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const highScoreEl = document.getElementById('high-score');

    const btnStart = document.getElementById('btn-start');
    const btnRestart = document.getElementById('btn-restart');

    // Logic Variables
    let score = 0;
    let lives = 3;
    let highScore = localStorage.getItem('unblocked_games_breakout_highscore') || 0;
    highScoreEl.innerText = highScore;

    let ballRadius = 7;
    let x = canvas.width / 2;
    let y = canvas.height - 30;
    let dx = 3;
    let dy = -3;

    let paddleHeight = 10;
    let paddleWidth = 75;
    let paddleX = (canvas.width - paddleWidth) / 2;

    const rowCount = 5;
    const colCount = 8;
    const brickWidth = 50;
    const brickHeight = 16;
    const brickPadding = 6;
    const brickOffsetTop = 40;
    const brickOffsetLeft = 20;

    const brickColors = ['#ec4899', '#a855f7', '#3b82f6', '#10b981', '#f59e0b']; // Retro grid colors
    let bricks = [];

    // Web Audio Synthesizer
    let audioCtx = null;
    function playTone(freq, duration, type = 'sine') {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    function initBricks() {
      bricks = [];
      for (let c = 0; c < colCount; c++) {
        bricks[c] = [];
        for (let r = 0; r < rowCount; r++) {
          bricks[c][r] = { x: 0, y: 0, status: 1 };
        }
      }
    }

    function startNewGame() {
      score = 0;
      lives = 3;
      scoreEl.innerText = score;
      livesEl.innerText = '♥'.repeat(lives);

      initBricks();
      resetBallPaddle();

      startOverlay.classList.remove('active');
      gameoverOverlay.classList.remove('active');
      playTone(440, 0.15, 'triangle');

      isRunning = true;
      requestAnimationFrame(draw);
    }

    function resetBallPaddle() {
      x = canvas.width / 2;
      y = canvas.height - 35;
      dx = (Math.random() > 0.5 ? 1 : -1) * (2.5 + Math.random());
      dy = -3.5;
      paddleX = (canvas.width - paddleWidth) / 2;
    }

    let isRunning = false;

    // Movement Tracking - Mouse & Touch
    function handleMove(clientX) {
      const rect = canvas.getBoundingClientRect();
      const relativeX = clientX - rect.left;
      const scaleX = canvas.width / rect.width;
      
      paddleX = (relativeX * scaleX) - paddleWidth / 2;
      
      // Pad boundary clamp
      if (paddleX < 0) paddleX = 0;
      if (paddleX + paddleWidth > canvas.width) paddleX = canvas.width - paddleWidth;
    }

    window.addEventListener('mousemove', (e) => {
      handleMove(e.clientX);
    });

    window.addEventListener('touchmove', (e) => {
      if (e.touches && e.touches[0]) {
        handleMove(e.touches[0].clientX);
      }
    }, { passive: true });

    // Collide Logic
    function collisionDetection() {
      let activeBricks = 0;
      for (let c = 0; c < colCount; c++) {
        for (let r = 0; r < rowCount; r++) {
          const b = bricks[c][r];
          if (b.status === 1) {
            activeBricks++;
            if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
              dy = -dy;
              b.status = 0;
              score += (rowCount - r) * 10; // Top rows score more
              scoreEl.innerText = score;
              playTone(500 + (r * 80), 0.08, 'sine');
            }
          }
        }
      }
      
      // Check Win condition
      if (activeBricks === 0 && isRunning) {
        victory();
      }
    }

    function finishQuiz(won) {
      isRunning = false;
      finalScoreEl.innerText = score;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('unblocked_games_breakout_highscore', highScore);
        highScoreEl.innerText = highScore;
      }

      endTitleEl.innerText = won ? "VICTORY!" : "GAME OVER";
      endTitleEl.style.color = won ? "#10b981" : "#f43f5e";
      gameoverOverlay.classList.add('active');
    }

    function victory() {
      playTone(880, 0.4, 'sine');
      finishQuiz(true);
    }

    function gameOver() {
      playTone(180, 0.4, 'sawtooth');
      finishQuiz(false);
    }

    function draw() {
      if (!isRunning) return;

      ctx.fillStyle = '#111827';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw bricks
      for (let c = 0; c < colCount; c++) {
        for (let r = 0; r < rowCount; r++) {
          if (bricks[c][r].status === 1) {
            const brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
            const brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
            bricks[c][r].x = brickX;
            bricks[c][r].y = brickY;
            
            ctx.shadowBlur = 4;
            ctx.shadowColor = brickColors[r];
            ctx.fillStyle = brickColors[r];
            
            ctx.fillRect(brickX, brickY, brickWidth, brickHeight);
          }
        }
      }
      ctx.shadowBlur = 0; // reset

      // Draw Pad
      ctx.shadowBlur = 6;
      ctx.shadowColor = '#a855f7';
      ctx.fillStyle = '#a855f7';
      ctx.fillRect(paddleX, canvas.height - paddleHeight - 15, paddleWidth, paddleHeight);

      // Draw Ball
      ctx.shadowColor = '#fff';
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      collisionDetection();

      // Side Bounce walls
      if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
        dx = -dx;
        playTone(330, 0.05, 'sine');
      }
      // Top wall Bounce
      if (y + dy < ballRadius) {
        dy = -dy;
        playTone(330, 0.05, 'sine');
      } 
      // Bottom out
      else if (y + dy > canvas.height - ballRadius - 15) {
        // Paddle collision
        if (x > paddleX && x < paddleX + paddleWidth) {
          // calculate paddle angle
          let hitPoint = (x - (paddleX + paddleWidth / 2)) / (paddleWidth / 2);
          dx = hitPoint * 4;
          dy = -Math.abs(dy); // force up
          playTone(440, 0.08, 'triangle');
        } else if (y + dy > canvas.height) {
          lives--;
          livesEl.innerText = '♥'.repeat(lives);
          if (lives <= 0) {
            gameOver();
            return;
          } else {
            playTone(200, 0.2, 'sawtooth');
            resetBallPaddle();
          }
        }
      }

      x += dx;
      y += dy;

      requestAnimationFrame(draw);
    }

    btnStart.addEventListener('click', startNewGame);
    btnRestart.addEventListener('click', startNewGame);

  </script>
</body>
</html>
