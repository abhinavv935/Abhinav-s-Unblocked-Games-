<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Neon Snake</title>
  <style>
    :root {
      --primary: #10b981;
      --primary-glow: rgba(16, 185, 129, 0.4);
      --bg: #0b0f19;
      --board: #111827;
      --text: #f3f4f6;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 400px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      background: var(--board);
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .hud span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .score-val {
      color: var(--primary);
      text-shadow: 0 0 8px var(--primary-glow);
    }
    .canvas-container {
      position: relative;
      background: var(--board);
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 15px var(--primary-glow);
      overflow: hidden;
      width: 100%;
      max-width: 400px;
      aspect-ratio: 1;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(4px);
      background: rgba(11, 15, 25, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 5;
    }
    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .overlay h2 {
      font-size: 24px;
      letter-spacing: 1px;
      color: var(--text);
    }
    .overlay button {
      background: var(--primary);
      color: #000;
      font-weight: bold;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 0 15px var(--primary-glow);
      transition: transform 0.1s, opacity 0.2s;
    }
    .overlay button:active {
      transform: scale(0.95);
    }
    /* Mobile controls */
    .controls {
      display: grid;
      grid-template-areas:
        ". up ."
        "left . right"
        ". down .";
      gap: 6px;
      width: 160px;
      margin-top: 12px;
    }
    @media (min-width: 500px) {
      .controls {
        display: none; /* Hide on desktops */
      }
    }
    .btn {
      background: var(--board);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      height: 48px;
      cursor: pointer;
    }
    .btn:active {
      background: var(--primary);
      color: #000;
      border-color: var(--primary);
    }
    .btn-up { grid-area: up; }
    .btn-left { grid-area: left; }
    .btn-right { grid-area: right; }
    .btn-down { grid-area: down; }
  </style>
</head>
<body>

  <div class="hud">
    <span>SCORE: <span id="score" class="score-val">0</span></span>
    <span>HIGH SCORE: <span id="high-score">0</span></span>
  </div>

  <div class="canvas-container">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="start-overlay" class="overlay active">
      <h2>NEON SNAKE</h2>
      <button id="btn-start">PLAY GAME</button>
    </div>
    <div id="pause-overlay" class="overlay">
      <h2>PAUSED</h2>
      <button id="btn-resume">RESUME</button>
    </div>
    <div id="gameover-overlay" class="overlay">
      <h2 style="color: #ef4444;">GAME OVER</h2>
      <p>Final Score: <span id="final-score" style="color: var(--primary); font-weight: bold;">0</span></p>
      <button id="btn-restart">RESTART</button>
    </div>
  </div>

  <div class="controls">
    <div class="btn btn-up" id="ctrl-up">▲</div>
    <div class="btn btn-left" id="ctrl-left">◀</div>
    <div class="btn btn-right" id="ctrl-right">▶</div>
    <div class="btn btn-down" id="ctrl-down">▼</div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('high-score');
    const finalScoreEl = document.getElementById('final-score');
    
    // Overlays
    const startOverlay = document.getElementById('start-overlay');
    const pauseOverlay = document.getElementById('pause-overlay');
    const gameoverOverlay = document.getElementById('gameover-overlay');
    
    // Buttons
    const btnStart = document.getElementById('btn-start');
    const btnResume = document.getElementById('btn-resume');
    const btnRestart = document.getElementById('btn-restart');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;
    
    let snake = [];
    let food = { x: 5, y: 5 };
    let dx = 1;
    let dy = 0;
    let score = 0;
    let highScore = localStorage.getItem('unblocked_games_snake_highscore') || 0;
    let gameInterval = null;
    let isPaused = false;
    let isRunning = false;
    let speed = 100; // ms per update

    highScoreEl.innerText = highScore;

    // Web Audio Synthesizer
    let audioCtx = null;
    function initSynth() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }
    function playTone(freq, duration, type = 'sine') {
      try {
        initSynth();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    // Start Game
    function startGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      dx = 1;
      dy = 0;
      score = 0;
      speed = 100;
      scoreEl.innerText = score;
      spawnFood();
      startOverlay.classList.remove('active');
      gameoverOverlay.classList.remove('active');
      pauseOverlay.classList.remove('active');
      isPaused = false;
      isRunning = true;
      playTone(300, 0.15, 'triangle');
      setTimeout(() => playTone(500, 0.2, 'triangle'), 100);
      
      clearInterval(gameInterval);
      gameInterval = setInterval(gameLoop, speed);
    }

    function spawnFood() {
      food.x = Math.floor(Math.random() * tileCount);
      food.y = Math.floor(Math.random() * tileCount);
      // Ensure food does not spawn inside the snake
      for (let part of snake) {
        if (part.x === food.x && part.y === food.y) {
          spawnFood();
          break;
        }
      }
    }

    function gameLoop() {
      if (isPaused || !isRunning) return;

      // Update snake position
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };

      // Wall collision or self collision
      if (
        head.x < 0 || head.x >= tileCount ||
        head.y < 0 || head.y >= tileCount ||
        collisionWithSelf(head)
      ) {
        gameOver();
        return;
      }

      snake.unshift(head);

      // Check if food eaten
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.innerText = score;
        playTone(600, 0.08, 'sine');
        spawnFood();
        // Slightly increase speed
        if (speed > 55) {
          speed -= 2;
          clearInterval(gameInterval);
          gameInterval = setInterval(gameLoop, speed);
        }
      } else {
        snake.pop();
      }

      draw();
    }

    function collisionWithSelf(head) {
      for (let i = 1; i < snake.length; i++) {
        if (snake[i].x === head.x && snake[i].y === head.y) {
          return true;
        }
      }
      return false;
    }

    function gameOver() {
      isRunning = false;
      playTone(150, 0.4, 'sawtooth');
      finalScoreEl.innerText = score;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('unblocked_games_snake_highscore', highScore);
        highScoreEl.innerText = highScore;
      }
      gameoverOverlay.classList.add('active');
      clearInterval(gameInterval);
    }

    function togglePause() {
      if (!isRunning) return;
      isPaused = !isPaused;
      if (isPaused) {
        pauseOverlay.classList.add('active');
        playTone(200, 0.1, 'sine');
      } else {
        pauseOverlay.classList.remove('active');
        playTone(400, 0.1, 'sine');
      }
    }

    function draw() {
      // Clear board
      ctx.fillStyle = '#111827';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw grid lines subtly
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
      ctx.lineWidth = 1;
      for (let i = 0; i < tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }

      // Draw glowing food
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#ef4444';
      ctx.fillStyle = '#ef4444';
      ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);

      // Draw snake
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#10b981';
      snake.forEach((part, i) => {
        // Multi-shaded green
        if (i === 0) {
          ctx.fillStyle = '#34d399';
        } else {
          ctx.fillStyle = '#059669';
        }
        ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
      });
      ctx.shadowBlur = 0; // reset
    }

    // Direction Logic
    function changeDirection(newDx, newDy) {
      if (!isRunning || isPaused) return;
      // Prevent reversing into itself
      if (newDx === -dx && newDx !== 0) return;
      if (newDy === -dy && newDy !== 0) return;
      dx = newDx;
      dy = newDy;
      playTone(450, 0.02, 'sine');
    }

    // Event listeners
    window.addEventListener('keydown', (e) => {
      if (['ArrowUp', 'KeyW'].includes(e.code)) changeDirection(0, -1);
      if (['ArrowDown', 'KeyS'].includes(e.code)) changeDirection(0, 1);
      if (['ArrowLeft', 'KeyA'].includes(e.code)) changeDirection(-1, 0);
      if (['ArrowRight', 'KeyD'].includes(e.code)) changeDirection(1, 0);
      if (e.code === 'Escape' || e.code === 'KeyP') togglePause();
    });

    btnStart.addEventListener('click', startGame);
    btnResume.addEventListener('click', togglePause);
    btnRestart.addEventListener('click', startGame);

    // Mobile Virtual Keys
    document.getElementById('ctrl-up').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(0, -1); });
    document.getElementById('ctrl-down').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(0, 1); });
    document.getElementById('ctrl-left').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(-1, 0); });
    document.getElementById('ctrl-right').addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(1, 0); });

    document.getElementById('ctrl-up').addEventListener('mousedown', () => changeDirection(0, -1));
    document.getElementById('ctrl-down').addEventListener('mousedown', () => changeDirection(0, 1));
    document.getElementById('ctrl-left').addEventListener('mousedown', () => changeDirection(-1, 0));
    document.getElementById('ctrl-right').addEventListener('mousedown', () => changeDirection(1, 0));

  </script>
</body>
</html>
